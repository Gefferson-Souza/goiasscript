name: CI/CD GoiásScript

on:
  push:
    branches: [main, staging, 'feat/**']
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Versão lida automaticamente de packageManager no package.json

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar linting
        run: pnpm lint

      - name: Verificar formatação
        run: pnpm format:check
        continue-on-error: true

      - name: Executar testes com cobertura
        run: pnpm test:coverage

      - name: Upload coverage para Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/core/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Smoke test CLI
        run: |
          cd packages/core
          node bin/goiasscript.js --version
          node bin/goiasscript.js dedo_de_prosa
          node bin/goiasscript.js traduz examples/basic/exemplo.gs
