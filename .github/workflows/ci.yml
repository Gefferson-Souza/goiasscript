name: CI/CD GoiásScript

on:
  push:
    branches: [main, staging, 'feat/**']
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Versão lida automaticamente de packageManager no package.json

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar linting
        run: pnpm lint

      - name: Verificar formatação
        run: pnpm format:check
        continue-on-error: true

      - name: Executar testes com cobertura
        run: pnpm test:coverage

      - name: Upload coverage para Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/core/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Smoke test CLI
        run: |
          cd packages/core
          node bin/goiasscript.js --version
          node bin/goiasscript.js dedo_de_prosa
          node bin/goiasscript.js traduz examples/basic/exemplo.gs

      - name: Smoke test browser entry
        run: |
          cd packages/core
          node -e "const {GoiasScriptBrowserCompiler}=require('./src/browser'); const r=new GoiasScriptBrowserCompiler().transpile('uai x é 42; prosa(x)'); if(!r.success) {console.error(r.error); process.exit(1)}; console.log('browser entry OK')"

  build-apps:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Build do playground
        run: pnpm playground:build

      - name: Typecheck do engoianador
        run: pnpm engoianador:typecheck
